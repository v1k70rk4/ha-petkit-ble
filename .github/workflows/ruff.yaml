name: Lint with Ruff

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ruff:
    runs-on: "ubuntu-latest"
    steps:
      - name: Check out the repository
        uses: "actions/checkout@v4"

      - name: Set up Python
        uses: "actions/setup-python@v5"
        with:
          python-version: "3.13"

      - name: Install Ruff
        run: "python -m pip install ruff==0.15.16"

      - name: Run Ruff
        run: "ruff check custom_components/petkit_ble"
