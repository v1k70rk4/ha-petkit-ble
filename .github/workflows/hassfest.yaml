name: Validate with hassfest

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: "ubuntu-latest"
    steps:
      - name: Check out the repository
        uses: "actions/checkout@v4"

      - name: Run hassfest validation
        uses: "home-assistant/actions/hassfest@master"
